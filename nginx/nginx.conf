# BioPay Nginx Reverse Proxy Configuration

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10M;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api:10m     rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=auth:10m    rate=10r/m;
    limit_req_zone  $binary_remote_addr  zone=global:10m  rate=100r/m;
    limit_conn_zone $binary_remote_addr  zone=conn:10m;

    # ── Upstream services ─────────────────────────────────
    upstream frontend {
        server frontend:5000;
        keepalive 32;
    }

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS ────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ───────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(self)" always;

        # ── Connection limits ──────────────────────────────
        limit_conn conn 20;
        limit_req  zone=global burst=50 nodelay;

        # ── API routes → FastAPI backend ───────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
                add_header 'Access-Control-Max-Age'       1728000;
                add_header 'Content-Length'               0;
                return 204;
            }
        }

        # ── Auth routes — stricter rate limit ──────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Health check (no auth, no rate limit) ──────────
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ── Static files — served with caching ────────────
        location /static/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            expires            7d;
            add_header         Cache-Control "public, immutable";
            access_log         off;
        }

        # ── All other routes → Flask frontend ─────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;

            # WebAuthn requires HTTPS
            proxy_cookie_flags ~ secure httponly samesite=lax;
        }

        # ── 50x error pages ────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            return 200 '<html><body style="background:#0d0f12;color:#eef0f3;font-family:system-ui;display:flex;height:100vh;align-items:center;justify-content:center"><div style="text-align:center"><h1 style="color:#00c896;font-size:3rem">⚡</h1><h2>Service temporarily unavailable</h2><p style="color:#8b93a0">BioPay will be back shortly.</p></div></body></html>';
            add_header Content-Type text/html;
        }
    }
}
